<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة رئيسية</title>
    <style>
        body {
            background-color: #f0f8ff;
            font-family: Arial, sans-serif;
            animation: backgroundAnimation 5s infinite alternate;
            margin: 0;
            padding: 0;
        }

        @keyframes backgroundAnimation {
            0% { background-color: #f0f8ff; }
            100% { background-color: #87cefa; }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>مرحباً بكم في موقعنا</h1>
        <p>هذا هو مثال على صفحة HTML بسيطة مع محتوى عربي.</p>
    </div>
</body>
</html>
